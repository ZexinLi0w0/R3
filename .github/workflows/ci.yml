name: CI

on:
  push:
    branches:
      - main
      - "upgrade/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

# Cancel superseded runs on the same branch/PR to save minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Lint
  #   - Ruff for fast syntax checks (E9, F7, F63, F82) on R3-specific code only.
  #   - We deliberately scope to project-specific dirs to avoid noise from
  #     vendored upstream code (autonomous-learning-library/* outside r3,
  #     gym-donkeycar examples).
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install ruff
        run: pip install "ruff>=0.6,<0.13"

      # The previously-tracked merge-conflict markers in MUSHR-DL/* have been
      # resolved (see commit bd1b8b5), so this step is now hard-failing.
      #
      # We narrow the MUSHR-DL surface to the files this PR touched
      # (model_runner.py, train_CNN.py, pytorch_model.py). The rest of
      # MUSHR-DL/ is legacy data-collection / input-handling glue (e.g.
      # key_check.py refers to a commented-out 'comp_mouse' Controller),
      # which is unrelated to the R3 modernization and would need its own
      # cleanup pass.
      - name: Lint R3-specific code (syntax errors only)
        run: |
          ruff check \
            --select=E9,F7,F63,F82 \
            --no-cache \
            autonomous-learning-library/all/r3/ \
            MUSHR-DL/model_runner.py \
            MUSHR-DL/train_CNN.py \
            MUSHR-DL/pytorch_model.py

  # ---------------------------------------------------------------------------
  # Job 2: R3 module unit tests
  #   - Installs CPU-only PyTorch from PyPI (Jetson wheels are not used here).
  #   - Installs the modernized autonomous-learning-library in editable mode.
  #   - Runs pytest against the *self-contained* R3 unit-test files. The
  #     bare-import bug from PR #1 was fixed in 331c54c so these now collect
  #     correctly from the repo root.
  #   - All four R3 test modules are executed, including
  #     replay_buffer_size_test.py, which now passes thanks to the
  #     buffer_resize/stop_thread shims restored on ExperienceReplayBuffer
  #     (see fix/r3-buffer-resize-compat).
  # ---------------------------------------------------------------------------
  r3-tests:
    name: R3 module pytest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install CPU PyTorch + ALL editable
        run: |
          python -m pip install --upgrade pip
          # CPU-only torch from PyPI (Jetson AI Lab wheels skipped on x86 runner)
          pip install --index-url https://download.pytorch.org/whl/cpu "torch>=2.5,<2.9"
          pip install pytest "numpy<2"
          pip install -e ./autonomous-learning-library

      - name: Run R3 unit tests
        run: |
          cd autonomous-learning-library
          python -m pytest all/r3/ -v --tb=short

  # ---------------------------------------------------------------------------
  # Job 3: Smoke imports
  #   - Verifies the three key import surfaces still work end-to-end on a
  #     vanilla x86 Python 3.10 with CPU torch:
  #       * import torch
  #       * import gymnasium + reset/step (Gymnasium 5-tuple API)
  #       * from all.r3 import runtime_coordinator, batch_size_control,
  #                              replay_buffer_size, deadline
  #       * from all.agents import DQN
  # ---------------------------------------------------------------------------
  smoke-imports:
    name: Smoke imports
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu "torch>=2.5,<2.9"
          pip install "numpy<2"
          pip install -e ./autonomous-learning-library

      - name: Import smoke test
        run: |
          python - <<'PY'
          import torch
          print("torch:", torch.__version__, "| cuda_available:", torch.cuda.is_available())

          import gymnasium as gym
          print("gymnasium:", gym.__version__)
          env = gym.make("CartPole-v1")
          obs, info = env.reset(seed=0)
          assert obs.shape == (4,), f"unexpected obs shape: {obs.shape}"
          obs, reward, terminated, truncated, info = env.step(env.action_space.sample())
          print("CartPole step OK | reward:", reward, "terminated:", terminated, "truncated:", truncated)
          env.close()

          from all.r3 import (
              runtime_coordinator,
              batch_size_control,
              replay_buffer_size,
              deadline,
          )
          print("all.r3 modules: OK")

          from all.agents import DQN
          print("all.agents.DQN: OK")
          PY
